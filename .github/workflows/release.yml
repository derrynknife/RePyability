name: release

# Publishes the package to PyPI when a GitHub Release is published.
#
# This uses PyPI "Trusted Publishing" (OIDC), so no API token is stored in the
# repository. Before the first release, configure a trusted publisher for the
# `repyability` project on PyPI pointing at this repo/workflow, and (optionally)
# create a `pypi` environment in the repo settings.
#
# Cut a release by tagging a commit (e.g. `git tag v0.5.0 && git push --tags`)
# and publishing a GitHub Release for that tag. Keep the tag in sync with
# `repyability/_version.py`.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/repyability
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set-up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
